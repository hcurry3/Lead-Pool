  .kpi .v{font-size:26px;font-weight:800;margin-top:5px;color:var(--ink)}

  .kpi .v.gold{color:var(--gold)}
  .panel{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .panel h2{margin:0 0 12px;font-size:14px}
  .panel h2 .sub{font-size:11px;color:var(--muted);font-weight:500;margin-left:8px}

  .goal .gv{font-size:30px;font-weight:800;margin:4px 0 2px}

  tr:hover td{background:#fafbfa}

  .t-available{background:var(--accent)} .t-working{background:var(--gold)}

  .muted{color:var(--muted);font-size:12px}

  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

<!-- ===========================================================================
  Shared-storage adapter.
  The app below talks to `window.storage.get/set`. On a normal website that
  object doesn't exist, so this shim wires it to:
    - a real serverless backend  (/api/storage)  for SHARED data
      (leads, deals, agents, notes) — everyone sees the same thing.
    - the browser's localStorage  for PER-DEVICE data (shared === false),
      e.g. each agent's own login session.
  If the backend isn't reachable yet (Redis not connected), shared reads
  return null and writes are no-ops, so the app still runs in a local/demo
  mode instead of crashing.
============================================================================ -->
<script>
window.storage = {
  async get(key, shared = true){
    if(shared === false){
      try{ const v = localStorage.getItem("fp:" + key); return v == null ? null : { value: v }; }
      catch(e){ return null; }
    }
    try{
      const r = await fetch("/api/storage?key=" + encodeURIComponent(key));
      if(!r.ok) return null;
      const d = await r.json();
      return (d && d.value != null) ? { value: d.value } : null;
    }catch(e){ return null; }
  },
  async set(key, value, shared = true){
    if(shared === false){
      try{ localStorage.setItem("fp:" + key, value); }catch(e){}
      return;
    }
    try{
      await fetch("/api/storage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: key, value: value })
      });
    }catch(e){}
  }
};
</script>

<script>
"use strict";
const MONEY = n => "$"+(Number(n)||0).toLocaleString();
const today = () => new Date().toISOString().slice(0,10);
const uid = p => p+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const CARRIERS = ["Americo (Eagle Premier)","Aetna/CVS (Accendo)","Prosperity (New Vista)","American-Amicable (Senior Choice)","Foresters (Plan Right)","Mutual of Omaha (Living Promise)","Transamerica (Immediate Solution)"];
const WEEK_GOAL = 5000;

/* ---------- storage layer (shared across agents; in-memory fallback) ---------- */
const DB = {
  ok: (typeof window!=="undefined" && window.storage && typeof window.storage.get==="function"),
  mem:{},
  async load(key, def, shared=true){
    if(!this.ok) return (key in this.mem)? this.mem[key] : def;
    try{ const r = await window.storage.get(key, shared); return r? JSON.parse(r.value): def; }
    catch(e){ return (key in this.mem)? this.mem[key] : def; }
  },
  async save(key, val, shared=true){
    this.mem[key]=val;
    if(!this.ok) return;
    try{ await window.storage.set(key, JSON.stringify(val), shared); }catch(e){}
  }
};

let S = { leads:[], deals:[], agents:[], me:null, session:null, view:"dash", boardMode:"agent", cpl:1, poolSort:{key:"name",dir:"asc"} };

/* ---------- seed ---------- */
function seed(){
  S.agents = [
    {id:"ag_owner",  name:"You (Owner)", team:"HQ", upline:"—", username:"owner", pw:hashPw("demo123"), role:"owner"},
    {id:"ag_marcus", name:"Marcus Reed", team:"Alpha", upline:"Owner", username:"marcus", pw:hashPw("demo123"), role:"agent"},
    {id:"ag_jas",    name:"Jasmine Cole", team:"Alpha", upline:"Marcus Reed", username:"jasmine", pw:hashPw("demo123"), role:"agent"},
    {id:"ag_derek",  name:"Derek Hall", team:"Bravo", upline:"Owner", username:"derek", pw:hashPw("demo123"), role:"agent"},
    {id:"ag_tanya",  name:"Tanya Brooks", team:"Bravo", upline:"Derek Hall", username:"tanya", pw:hashPw("demo123"), role:"agent"},
  ];
  const names=[["Earl Jennings","TN",71],["Gloria Pace","GA",68],["Roy Mercer","OH",77],["Betty Snyder","NC",74],
    ["Wendell Cruz","TX",66],["Mae Holloway","AL",80],["Curtis Dale","SC",69],["Irene Boyd","KY",73],
    ["Hank Mosley","MO",75],["Lucille Ray","FL",70],["Sam Pruitt","TN",64],["Edna Cole","VA",79]];
  // Leads stay in the shared pool until SOLD. "contacted" leads are still
  // available to everyone — the touched_by list just shows who has connected.
  const st=["available","available","available","available","available","available","closed","dead","available","reopened","available","available"];
  S.leads = names.map((n,i)=>({
    id:uid("ld"), name:n[0], phone:"("+(200+i)+") 555-"+(1000+i), state:n[1], age:n[2],
    imported_by: i%2? "Marcus Reed":"Derek Hall", import_batch:"aged-fex-"+today(),
    status: st[i]||"available", current_owner: st[i]==="closed"?"ag_marcus":null,
    touched_by: st[i]==="closed"?["Marcus Reed"]:[],
    times_worked: st[i]==="dead"?6:(st[i]==="closed"?2:0),
    last_called_by: st[i]==="closed"?"Marcus Reed":null, last_called_date: st[i]==="closed"?today():null
  }));
  // sample contact history + a scheduled appointment so the feature shows on first load.
  // Mae stays in the pool (available) but is visibly "connected" by Jasmine.
  const wk = S.leads.find(l=>l.name==="Mae Holloway");
  if(wk){ wk.touched_by=["Jasmine Cole"]; wk.times_worked=1; wk.last_called_by="Jasmine Cole"; wk.last_called_date=today();
    wk.followup_date=addDays(1); wk.followup_time="2:00 PM"; wk.followup_kind="appointment"; wk.followup_set_by="Jasmine Cole";
    wk.notes=[{ts:new Date(Date.now()-86400000).toISOString(),agent:"Jasmine Cole",text:"Reached her — interested but wants her husband on the call. Booked the appointment for tomorrow."}]; }
  const rp = S.leads.find(l=>l.status==="reopened");
  if(rp){ rp.followup_date=today(); rp.followup_kind="followup"; rp.followup_set_by="Marcus Reed";
    rp.notes=[{ts:new Date(Date.now()-3600000).toISOString(),agent:"Marcus Reed",text:"Chargeback — card declined. Recycled back to pool, needs a re-close."}]; }
  const cl = S.leads.find(l=>l.status==="closed");
  S.deals = [
    {id:uid("dl"), lead_id: cl?cl.id:null, lead_name: cl?cl.name:"Roy Mercer", closed_by:"Marcus Reed", closer_team:"Alpha", closer_upline:"Owner",
     carrier:CARRIERS[0], annual_ap:1140, monthly_premium:95, coverage_amount:10000, draft_date:today(), effective_date:today(), policy_number:"AM-88231", close_date:today(), status:"active"},
    {id:uid("dl"), lead_id:null, lead_name:"Pearl Dawson", closed_by:"Derek Hall", closer_team:"Bravo", closer_upline:"Owner",
     carrier:CARRIERS[5], annual_ap:960, monthly_premium:80, coverage_amount:8000, draft_date:today(), effective_date:today(), policy_number:"MO-55012", close_date:today(), status:"active"},
    {id:uid("dl"), lead_id:null, lead_name:"Otis Crane", closed_by:"Jasmine Cole", closer_team:"Alpha", closer_upline:"Marcus Reed",
     carrier:CARRIERS[1], annual_ap:1320, monthly_premium:110, coverage_amount:12000, draft_date:today(), effective_date:today(), policy_number:"AE-22190", close_date:today(), status:"active"},
  ];
}

/* ---------- persistence ---------- */
async function loadAll(){
  S.leads  = await DB.load("crm:leads", []);
  S.deals  = await DB.load("crm:deals", []);
  S.agents = await DB.load("crm:agents", []);
}
async function saveLeads(){ await DB.save("crm:leads", S.leads); }
async function saveDeals(){ await DB.save("crm:deals", S.deals); }
async function saveAgents(){ await DB.save("crm:agents", S.agents); }
async function saveSession(){ await DB.save("crm:session", S.session, false); }
function hashPw(s){ let h=5381; for(let i=0;i<(s||"").length;i++){ h=(((h<<5)+h)+s.charCodeAt(i))>>>0; } return "h"+h.toString(36); }
function showApp(){
  document.getElementById("login").style.display="none";
  document.querySelector(".app").style.display="flex";
  document.querySelectorAll(".owner-only").forEach(b=>b.style.display=isOwner()?"":"none");
  fillMe(); render();
}
function showLogin(){
  document.querySelector(".app").style.display="none";
  document.getElementById("login").style.display="flex";
  document.getElementById("luser").value=""; document.getElementById("lpass").value="";
  document.getElementById("lerr").textContent="";
  setTimeout(()=>{const u=document.getElementById("luser"); if(u) u.focus();},60);
}
async function doLogin(){
  const u=document.getElementById("luser").value.trim().toLowerCase();
  const p=document.getElementById("lpass").value;
  const a=S.agents.find(x=>(x.username||"").toLowerCase()===u);
  if(!a || a.pw!==hashPw(p)){ document.getElementById("lerr").textContent="Invalid username or password."; return; }
  S.session=a.id; S.me=a.id; await saveSession(); showApp();
}
async function doLogout(){ S.session=null; S.me=null; await saveSession(); showLogin(); }
function openPw(){
  document.getElementById("modalRoot").innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
   <div class="modal" style="max-width:400px">
     <h3>Change Password</h3>
     <div class="ms">Update the password for <b>${meName()}</b>.</div>
     <div class="field"><label>Current password</label><input id="pwCur" type="password"></div>
     <div class="field"><label>New password</label><input id="pwNew" type="password"></div>
     <div class="field"><label>Confirm new password</label><input id="pwCon" type="password"></div>
     <div id="pwErr" class="lerr"></div>
     <div class="mfoot"><button class="btn s" onclick="closeModal()">Cancel</button><button class="btn p" onclick="changePw()">Update</button></div>
   </div>
  </div>`;
}
async function changePw(){
  const a=agentById(S.me); if(!a) return;
  const cur=document.getElementById("pwCur").value, nw=document.getElementById("pwNew").value, cn=document.getElementById("pwCon").value;
  const err=document.getElementById("pwErr");
  if(a.pw!==hashPw(cur)){ err.textContent="Current password is incorrect."; return; }
  if((nw||"").length<4){ err.textContent="New password must be at least 4 characters."; return; }
  if(nw!==cn){ err.textContent="New passwords don't match."; return; }
  a.pw=hashPw(nw); await saveAgents(); closeModal(); alert("Password updated.");
}

/* ---------- helpers ---------- */
const agentById = id => S.agents.find(a=>a.id===id);
const meName = () => { const a=agentById(S.me); return a?a.name:"—"; };
const isOwner = () => { const a=agentById(S.me); return !!(a&&a.role==="owner"); };
function setCPL(v){ S.cpl=Number(v)||0; render(); }
const meObj  = () => agentById(S.me) || {name:"—",team:"—",upline:"—"};
function withinDays(dateStr, days){
  if(!dateStr) return false;
  const d=new Date(dateStr), now=new Date();
  return (now - d)/(1000*60*60*24) <= days;
}
function dialable(){ return S.leads.filter(l=>l.status==="available"||l.status==="reopened"); }
// "My Pipeline" = open leads I've personally made contact with (called),
// not sold or dead. Leads are never locked to me until I sell them.
function myWorking(){ return S.leads.filter(l=> (l.touched_by||[]).includes(meName()) && l.status!=="closed" && l.status!=="dead"); }
function activeDeals(){ return S.deals.filter(d=>d.status==="active"); }

/* ---------- render router ---------- */
const TITLES = {dash:"Dashboard",pool:"Lead Pool",mine:"My Pipeline",followups:"Follow-ups",board:"Leaderboard",command:"Command Center",admin:"Admin"};
function render(){
  document.getElementById("ptitle").textContent = TITLES[S.view];
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("on", b.dataset.v===S.view));
  const v=document.getElementById("view");
  if(S.view==="dash") v.innerHTML=renderDash();
  else if(S.view==="pool") v.innerHTML=renderPool();
  else if(S.view==="mine") v.innerHTML=renderMine();
  else if(S.view==="followups") v.innerHTML=renderFollowups();
  else if(S.view==="board") v.innerHTML=renderBoard();

/* ---------- LEADERBOARD ---------- */
function aggBy(field){
  const m={};
  activeDeals().forEach(d=>{
    const k = field==="closed_by"? d.closed_by : field==="closer_team"? d.closer_team : d.closer_upline;
    if(!k) return;
    if(!m[k]) m[k]={key:k,count:0,ap:0,team:d.closer_team,upline:d.closer_upline};
    m[k].count++; m[k].ap+=Number(d.annual_ap||0);
  });
  return Object.values(m).sort((a,b)=>b.ap-a.ap);
}

// Log that the current agent called/made contact with this lead. The lead
// STAYS in the shared pool — calling never claims it. Everyone can see who
// has connected (touched_by) and who called last.
async function markCalled(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  l.times_worked=(l.times_worked||0)+1;
  l.last_called_by=meName(); l.last_called_date=today();
  if(!l.touched_by) l.touched_by=[];
  if(!l.touched_by.includes(meName())) l.touched_by.push(meName());
  if(!l.notes) l.notes=[];
  l.notes.push({ts:new Date().toISOString(), agent:meName(), text:"📞 Logged a call"});
  await saveLeads(); render();
}
async function markDead(id){ const l=S.leads.find(x=>x.id===id); if(l){ l.status="dead"; l.current_owner=null; await saveLeads(); render(); } }

async function confirmClose(id){

  const m=meObj();

  const ap=Number(g("cf_ap")||0);

  S.deals.push({
    id:uid("dl"), lead_id:l.id, lead_name:l.name,
    closed_by:m.name, closer_team:m.team, closer_upline:m.upline,
    carrier:g("cf_carrier"), annual_ap:ap, monthly_premium:Number(g("cf_mp")||0),

    policy_number:g("cf_pol"), close_date:today(), status:"active"
  });
  l.status="closed"; l.current_owner=S.me;
  if(!l.touched_by.includes(m.name)) l.touched_by.push(m.name);
  await saveDeals(); await saveLeads(); closeModal(); S.view="board"; render();
}

async function chargeback(dealId){
  const d=S.deals.find(x=>x.id===dealId); if(!d) return;
  d.status="chargeback";
  if(d.lead_id){ const l=S.leads.find(x=>x.id===d.lead_id); if(l){ l.status="reopened"; l.current_owner=null; } }
  await saveDeals(); await saveLeads(); render();
}
async function del(id){ S.leads=S.leads.filter(l=>l.id!==id); await saveLeads(); render(); }

async function doImport(){
  const raw=document.getElementById("impBox").value.trim();
  const by=document.getElementById("impBy").value;
  if(!raw){ alert("Paste at least one lead."); return; }
  let added=0;
  raw.split("\n").forEach(line=>{
    const p=line.split(",").map(s=>s.trim());
    if(!p[0]) return;
    S.leads.push({id:uid("ld"), name:p[0], phone:p[1]||"", state:(p[2]||"").toUpperCase(), age:Number(p[3]||0),
      imported_by:by, import_batch:"import-"+today(), status:"available", current_owner:null,
      touched_by:[], times_worked:0, last_called_by:null, last_called_date:null});
    added++;
  });
  await saveLeads(); document.getElementById("impBox").value=""; render();
  alert(added+" lead"+(added===1?"":"s")+" added to the pool.");
}

/* ---------- file import: CSV / Excel / PDF ---------- */
let pendingImport = [];

// Figure out which column is which from a header row. Returns -1 for any
// field we can't find, in which case the caller falls back to fixed order.
function mapColumns(headerRow){
  const idx={name:-1,phone:-1,state:-1,age:-1};
  (headerRow||[]).forEach((h,i)=>{
    const k=String(h||"").toLowerCase().trim();
    if(idx.name<0 && /(^name$|full ?name|lead ?name|client|contact|first)/.test(k)) idx.name=i;
    else if(idx.phone<0 && /(phone|number|cell|mobile|^tel)/.test(k)) idx.phone=i;
    else if(idx.state<0 && /(^state$|^st$|province|region)/.test(k)) idx.state=i;
    else if(idx.age<0 && /(^age$|^age\b)/.test(k)) idx.age=i;
  });
  return idx;
}
// Turn an array-of-rows (each row an array of cells) into lead objects.
function rowsToLeads(rows){
  rows=(rows||[]).filter(r=>r && r.some(c=>String(c==null?"":c).trim()!==""));
  if(!rows.length) return [];
  let idx=mapColumns(rows[0]);
  let dataRows;
  if(idx.name>=0 || idx.phone>=0){ dataRows=rows.slice(1); }          // had a header
  else { idx={name:0,phone:1,state:2,age:3}; dataRows=rows; }          // no header → fixed order
  const leads=[];
  dataRows.forEach(r=>{
    const get=i=> (i>=0 && i<r.length) ? String(r[i]==null?"":r[i]).trim() : "";
    const name=get(idx.name);
    if(!name) return;
    const ageRaw=get(idx.age); const ageM=ageRaw.match(/\d{1,3}/);
    leads.push({ name, phone:get(idx.phone), state:get(idx.state).toUpperCase(), age: ageM?Number(ageM[0]):0 });
  });
  return leads;
}
async function parseSpreadsheet(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:""});
  return rowsToLeads(rows);
}
async function parsePdf(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const lines=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const byY={};
    tc.items.forEach(it=>{ const y=Math.round(it.transform[5]); (byY[y]=byY[y]||[]).push(it); });
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const row=byY[y].sort((a,b)=>a.transform[4]-b.transform[4]).map(i=>i.str).join(" ").replace(/\s+/g," ").trim();
      if(row) lines.push(row);
    });
  }
  // split each visual line into cells on commas, pipes, tabs, or runs of 2+ spaces
  const rows=lines.map(l=>l.split(/\s*[,|\t]\s*|\s{2,}/).map(s=>s.trim()).filter(s=>s!==""));
  return rowsToLeads(rows);
}
async function importFile(e){
  const file=e.target.files && e.target.files[0]; if(!file) return;
  const nm=file.name.toLowerCase();
  const prev=document.getElementById("impPreview");
  if(prev) prev.innerHTML='<div class="muted" style="padding:6px 0">Reading <b>'+escapeHtml(file.name)+'</b>…</div>';
  try{
    let leads=[];
    if(nm.endsWith(".pdf")){
      if(typeof pdfjsLib==="undefined"){ if(prev) prev.textContent="PDF reader still loading — try again in a moment."; return; }
      leads=await parsePdf(file);
    } else if(nm.endsWith(".csv")||nm.endsWith(".xlsx")||nm.endsWith(".xls")){
      if(typeof XLSX==="undefined"){ if(prev) prev.textContent="Spreadsheet reader still loading — try again in a moment."; return; }
      leads=await parseSpreadsheet(file);
    } else { if(prev) prev.innerHTML='<div style="color:var(--red)">Unsupported file. Use CSV, Excel (.xlsx/.xls), or PDF.</div>'; return; }
    pendingImport=leads;
    renderImportPreview(file.name);
  }catch(err){
    if(prev) prev.innerHTML='<div style="color:var(--red)">Could not read that file: '+escapeHtml(String(err&&err.message||err))+'</div>';
  }
  e.target.value=""; // let the same file be re-picked
}
function renderImportPreview(fname){
  const prev=document.getElementById("impPreview"); if(!prev) return;
  if(!pendingImport.length){
    prev.innerHTML='<div style="color:var(--red);padding:6px 0">No leads found in '+escapeHtml(fname||"that file")+'. Make sure it has Name / Phone / State / Age columns.</div>';
    return;
  }
  const sample=pendingImport.slice(0,5);
  prev.innerHTML=`
    <div style="padding:12px;border:1px solid var(--rule);border-radius:10px;background:#fafbfa;margin-bottom:6px">
      <b>${pendingImport.length}</b> lead${pendingImport.length===1?'':'s'} found in <b>${escapeHtml(fname||"file")}</b> — preview:
      <table style="margin:8px 0"><thead><tr><th>Name</th><th>Phone</th><th>State</th><th>Age</th></tr></thead><tbody>
      ${sample.map(l=>`<tr><td><b>${escapeHtml(l.name)}</b></td><td class="muted">${escapeHtml(l.phone)||'—'}</td><td>${escapeHtml(l.state)||'—'}</td><td>${l.age||'—'}</td></tr>`).join("")}
      ${pendingImport.length>5?`<tr><td colspan="4" class="muted">…and ${pendingImport.length-5} more</td></tr>`:''}
      </tbody></table>
      <div class="row">
        <button class="btn p sm" onclick="commitImport()">Add ${pendingImport.length} to pool</button>
        <button class="btn s sm" onclick="cancelImport()">Cancel</button>
      </div>
    </div>`;
}
function cancelImport(){ pendingImport=[]; const p=document.getElementById("impPreview"); if(p) p.innerHTML=""; }
async function commitImport(){
  if(!pendingImport.length) return;
  const sel=document.getElementById("impBy");
  const by= sel? sel.value : meName();
  let added=0;
  pendingImport.forEach(l=>{
    if(!l.name) return;
    S.leads.push({id:uid("ld"), name:l.name, phone:l.phone||"", state:(l.state||"").toUpperCase(), age:Number(l.age||0),
      imported_by:by, import_batch:"file-"+today(), status:"available", current_owner:null,
      touched_by:[], times_worked:0, last_called_by:null, last_called_date:null});
    added++;
  });
  pendingImport=[];
  await saveLeads(); render();
  alert(added+" lead"+(added===1?"":"s")+" imported and added to the pool.");
}

/* ---------- sorting (lead tables) ---------- */
// compare helper used by the pool table; sorts by name or state, asc/desc.
function sortLeads(leads){
  const {key,dir}=S.poolSort||{key:"name",dir:"asc"};
  const mul=dir==="desc"?-1:1;
  // value used for comparison per sort key. Leads with no appointment sort
  // to the bottom (ascending) so booked leads surface first.
  const val=l=>{
    if(key==="appt") return l.followup_date? (l.followup_date+(l.followup_time||"")) : "9999-99-99";
    return String(l[key]||"").toLowerCase();
  };
  return leads.slice().sort((a,b)=>{
    const av=val(a), bv=val(b);
    if(av<bv) return -1*mul;
    if(av>bv) return 1*mul;
    const an=String(a.name||"").toLowerCase(), bn=String(b.name||"").toLowerCase();
    return an<bn?-1:an>bn?1:0; // tie-breaker: name
  });
}
function setPoolSort(key){
  if(!S.poolSort) S.poolSort={key:"name",dir:"asc"};
  if(S.poolSort.key===key){ S.poolSort.dir = S.poolSort.dir==="asc"?"desc":"asc"; }
  else { S.poolSort={key,dir:"asc"}; }
  render();
}
function sortArrow(key){
  const s=S.poolSort||{key:"name",dir:"asc"};
  if(s.key!==key) return ' <span class="muted" style="font-weight:400">↕</span>';
  return s.dir==="asc"? ' ▲':' ▼';
}
// Renders who has made contact with a lead, the call count, and who called last.
function touchersCell(l){
  const t=(l.touched_by||[]);
  const calls=l.times_worked? `${l.times_worked} call${l.times_worked===1?'':'s'}` : "no calls";
  if(!t.length) return `<span class="muted">— not contacted</span><div class="muted" style="font-size:10px;margin-top:2px">${calls}</div>`;
  const pills=t.map(n=>`<span class="pill" style="margin:1px 3px 1px 0">${escapeHtml(n)}</span>`).join("");
  const last=l.last_called_by? ` · last: ${escapeHtml(l.last_called_by)}${l.last_called_date?' '+fmtDate(l.last_called_date):''}`:'';
  return pills+`<div class="muted" style="font-size:10px;margin-top:2px">${calls}${last}</div>`;
}
// Shared appointment / follow-up visibility — everyone sees when a lead is
// booked and by whom.
function apptCell(l){
  if(!l.followup_date) return '<span class="muted">—</span>';
  return schedBadge(l)+`<div class="muted" style="font-size:10px;margin-top:2px">${l.followup_kind==='appointment'?'Appt':'Follow-up'} · ${escapeHtml(l.followup_set_by||'')}</div>`;
}
async function addAgent(){
  const name=document.getElementById("agName").value.trim();
  const team=document.getElementById("agTeam").value.trim()||"Unassigned";
  const up=document.getElementById("agUp").value;
  const user=document.getElementById("agUser").value.trim().toLowerCase();
  const pass=document.getElementById("agPass").value;
  if(!name||!user||!pass){ alert("Enter a name, username, and password."); return; }
  if(S.agents.some(a=>(a.username||"").toLowerCase()===user)){ alert("That username is taken — pick another."); return; }
  S.agents.push({id:uid("ag"), name, team, upline:up, username:user, pw:hashPw(pass), role:"agent"});
  await saveAgents(); render();
  alert("Agent created. They can log in with username \""+user+"\".");
}
async function reseed(){ if(!confirm("Reset to demo data? This replaces current data.")) return; seed(); await saveLeads(); await saveDeals(); await saveAgents(); S.session=S.agents[0].id; S.me=S.session; await saveSession(); fillMe(); render(); }
async function wipe(){ if(!confirm("Clear ALL leads, deals, and agents?")) return; S.leads=[];S.deals=[];S.agents=[]; await saveLeads();await saveDeals();await saveAgents(); seed(); await saveLeads();await saveDeals();await saveAgents(); S.session=S.agents[0].id; S.me=S.session; await saveSession(); fillMe(); render(); }

/* ---------- follow-ups & notes ---------- */
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmtDate(s){ if(!s) return "—"; const d=new Date(s+"T00:00:00"); return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function fmtWhen(ts){ const d=new Date(ts); return d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
function dueStatus(s){ if(!s) return null; const t=today(); if(s<t) return "overdue"; if(s===t) return "today"; return "upcoming"; }
function fmtTime(t){ if(!t) return ""; const [h,m]=t.split(":").map(Number); const ap=h>=12?"PM":"AM"; const hh=((h+11)%12)+1; return hh+":"+String(m).padStart(2,"0")+" "+ap; }
function schedBadge(l){
  if(!l.followup_date) return `<span class="muted">—</span>`;
  const ds=dueStatus(l.followup_date), isAppt=l.followup_kind==="appointment";
  const col=ds==="overdue"?"var(--red)":ds==="today"?"var(--gold)":(isAppt?"var(--blue)":"var(--accent)");
  let txt=(isAppt?"Appt ":"");
  txt += ds==="overdue"?"Overdue":(ds==="today"?(isAppt&&l.followup_time?l.followup_time:"Today"):(fmtDate(l.followup_date)+(isAppt&&l.followup_time?" "+l.followup_time:"")));
  return `<span class="tag" style="background:${col}">${txt}</span>`;
}
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function myFollowups(){
  return S.leads.filter(l=>l.followup_date && (l.current_owner===S.me || l.followup_set_by===meName()))
    .sort((a,b)=> a.followup_date<b.followup_date?-1:1);
}
function followupsDue(){ const t=today(); return myFollowups().filter(l=>l.followup_date<=t); }

function renderFollowups(){
  const fu=myFollowups();
  return `
  <div class="panel">
    <h2>My Follow-ups &amp; Appointments <span class="sub">${fu.length} scheduled · click a lead to open notes</span></h2>
    ${fu.length? `<table><thead><tr><th>When</th><th>Type</th><th>Lead</th><th>Set by</th><th>Last note</th><th></th></tr></thead><tbody>
      ${fu.map(l=>{const last=(l.notes&&l.notes.length)?l.notes[l.notes.length-1].text:"";
        return `<tr>
          <td>${schedBadge(l)}</td>
          <td>${l.followup_kind==="appointment"?'<span class="tag" style="background:var(--blue)">Appointment</span>':'<span class="pill">Follow-up</span>'}</td>
          <td><a href="#" onclick="openLead('${l.id}');return false"><b>${l.name}</b></a><div class="muted">${l.phone}</div></td>
          <td><b>${l.followup_set_by||'—'}</b></td>
          <td class="muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(last)||'—'}</td>
          <td style="text-align:right"><button class="btn p sm" onclick="openLead('${l.id}')">Open</button></td>
        </tr>`;}).join("")}
    </tbody></table>` : `<div class="empty">No follow-ups or appointments scheduled. Open any lead and set one.</div>`}
  </div>`;
}
function renderDueFollowupsPanel(){
  const due=followupsDue(); if(!due.length) return "";
  return `<div class="panel" style="border-left:3px solid var(--gold)">
    <h2>Due Today <span class="sub">${due.length} follow-up/appointment${due.length===1?'':'s'} to handle</span></h2>
    <table><tbody>${due.map(l=>{
      return `<tr><td><a href="#" onclick="openLead('${l.id}');return false"><b>${l.name}</b></a> <span class="muted">${l.phone}</span>
        <div class="muted">${l.followup_kind==="appointment"?"Appointment":"Follow-up"} · set by ${l.followup_set_by||'—'}</div></td>
      <td style="text-align:right;white-space:nowrap">${schedBadge(l)}&nbsp;<button class="btn p sm" onclick="openLead('${l.id}')">Open</button></td></tr>`;}).join("")}</tbody></table>
  </div>`;
}

/* lead detail modal: call notes + follow-up */
function openLead(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(!l.notes) l.notes=[];
  const fuLabel=l.followup_date? `<span class="pill" style="background:#eef3f1;color:${l.followup_kind==='appointment'?'var(--blue)':'var(--accent)'}">${l.followup_kind==='appointment'?'Appointment':'Follow-up'}: ${fmtDate(l.followup_date)}${(l.followup_kind==='appointment'&&l.followup_time)?' at '+l.followup_time:''} &middot; set by ${l.followup_set_by||meName()}</span>` : `<span class="muted">none set</span>`;
  document.getElementById("modalRoot").innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
   <div class="modal" style="max-width:560px">
     <h3>${l.name}</h3>
     <div class="ms">${l.phone} · ${l.state} · age ${l.age} · <span class="tag t-${l.status}">${l.status}</span></div>

     <div class="field" style="margin-bottom:6px"><label>Scheduled &nbsp; ${fuLabel}</label></div>
     <div style="font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:4px">FOLLOW-UP (CALLBACK)</div>
     <div class="row" style="margin-bottom:10px">
       <button class="btn s sm" onclick="setFollowup('${l.id}',1)">Tomorrow</button>
       <button class="btn s sm" onclick="setFollowup('${l.id}',3)">In 3 days</button>
       <button class="btn s sm" onclick="setFollowup('${l.id}',7)">Next week</button>
       <input type="date" style="padding:7px;border:1px solid var(--rule);border-radius:8px;font-size:12px" onchange="setFollowupDate('${l.id}',this.value)">
     </div>
     <div style="font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:4px">APPOINTMENT (DATE + TIME)</div>
     <div class="row" style="margin-bottom:15px">
       <input type="date" id="apDate" style="padding:7px;border:1px solid var(--rule);border-radius:8px;font-size:12px">
       <input type="time" id="apTime" style="padding:7px;border:1px solid var(--rule);border-radius:8px;font-size:12px">
       <button class="btn p sm" onclick="setAppointment('${l.id}')">Set appointment</button>
       ${l.followup_date?`<button class="btn d sm" onclick="setFollowup('${l.id}',0,true)">Clear</button>`:""}
     </div>

     <div class="field"><label>Add a note / call comment</label>
       <textarea id="noteBox" rows="2" placeholder="e.g. No answer, left VM — or — interested, wants spouse on next call"></textarea></div>
     <div class="row" style="margin-bottom:15px">
       <button class="btn p sm" onclick="logCall('${l.id}')">Log Call + Note</button>
       <button class="btn s sm" onclick="addNote('${l.id}')">Add Note Only</button>
     </div>

     <div class="field"><label>Call log &amp; notes</label></div>
     <div id="noteList" style="max-height:230px;overflow:auto">${renderNotes(l)}</div>

     <div class="mfoot" style="margin-top:16px">
       ${(l.status!=="closed"&&l.status!=="dead")?`<button class="btn d sm" onclick="markDead('${l.id}');closeModal()">Mark Dead</button>`:""}
       ${(l.status==="working"||l.status==="available"||l.status==="reopened")?`<button class="btn p sm" onclick="closeModal();openClose('${l.id}')">Mark Sold</button>`:""}
       <button class="btn s" onclick="closeModal()">Done</button>
     </div>
   </div>
  </div>`;
}
function renderNotes(l){
  if(!l.notes||!l.notes.length) return `<div class="muted" style="padding:6px 0">No notes yet — log your first call above.</div>`;
  return l.notes.slice().reverse().map(n=>`<div style="padding:8px 0;border-bottom:1px solid var(--rule)">
     <div style="font-size:11px;color:var(--muted)"><b style="color:var(--ink)">${n.agent}</b> · ${fmtWhen(n.ts)}</div>
     <div style="font-size:13px;margin-top:2px">${escapeHtml(n.text)}</div></div>`).join("");
}
function refreshNotes(id){ const l=S.leads.find(x=>x.id===id); const el=document.getElementById("noteList"); if(el&&l) el.innerHTML=renderNotes(l); }
async function addNote(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  const box=document.getElementById("noteBox"); const txt=(box.value||"").trim();
  if(!txt){ box.focus(); return; }
  if(!l.notes) l.notes=[];
  l.notes.push({ts:new Date().toISOString(), agent:meName(), text:txt});
  box.value=""; await saveLeads(); refreshNotes(id);
}
async function logCall(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  l.times_worked=(l.times_worked||0)+1; l.last_called_by=meName(); l.last_called_date=today();
  if(!l.touched_by) l.touched_by=[]; if(!l.touched_by.includes(meName())) l.touched_by.push(meName());
  const box=document.getElementById("noteBox"); const txt=(box.value||"").trim();
  if(!l.notes) l.notes=[];
  l.notes.push({ts:new Date().toISOString(), agent:meName(), text:(txt?txt:"Called — no answer / no note")});
  box.value=""; await saveLeads(); refreshNotes(id);
}
async function setFollowup(id,days,clear){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(clear){ l.followup_date=null; l.followup_time=""; l.followup_kind=null; l.followup_set_by=null; }
  else { l.followup_date=addDays(days); l.followup_time=""; l.followup_kind="followup"; l.followup_set_by=meName(); }
  await saveLeads(); openLead(id);
}
async function setFollowupDate(id,val){
  const l=S.leads.find(x=>x.id===id); if(!l||!val) return;
  l.followup_date=val; l.followup_time=""; l.followup_kind="followup"; l.followup_set_by=meName(); await saveLeads(); openLead(id);
}
async function setAppointment(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  const d=document.getElementById("apDate").value, t=document.getElementById("apTime").value;
  if(!d){ alert("Pick an appointment date."); return; }
  l.followup_date=d; l.followup_time=t?fmtTime(t):""; l.followup_kind="appointment"; l.followup_set_by=meName();
  await saveLeads(); openLead(id);
}

/* ---------- nav ---------- */
function go(v){ if((v==="admin"||v==="command")&&!isOwner()) v="dash"; S.view=v; render(); window.scrollTo(0,0); }
function setBoard(m){ S.boardMode=m; render(); }
function fillMe(){ const el=document.getElementById("meName"); if(el) el.textContent=meName(); }

  await loadAll();
  if(!S.agents.length){ seed(); await saveLeads(); await saveDeals(); await saveAgents(); }
  document.getElementById("nav").addEventListener("click",e=>{const b=e.target.closest("button");if(b){go(b.dataset.v);}});

  document.getElementById("loginhint").innerHTML='Demo logins — <b>owner</b>, <b>marcus</b>, <b>jasmine</b>, <b>derek</b>, <b>tanya</b> · password <b>demo123</b>';
  // restore the per-device session (stored in localStorage, not shared)
  S.session = await DB.load("crm:session", null, false);
  if(S.session && agentById(S.session)){ S.me = S.session; showApp(); }
  else { showLogin(); }
}
init();
