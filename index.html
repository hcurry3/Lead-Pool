<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For The People — Lead Engine CRM</title>
<style>
  :root{
    --ink:#1a1a2e; --ink2:#262642; --accent:#0f5d4a; --accent2:#13795f; --gold:#c8923a;
    --bg:#eef1ef; --card:#ffffff; --muted:#6b7280; --rule:#e2e7e3; --red:#9e2b25; --blue:#2f6f8f;
    --green:#0f5d4a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px}
  a{color:inherit}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .side{width:212px;background:var(--ink);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:18px 18px 14px;border-bottom:1px solid #2c2c4a}
  .brand .b1{font-weight:800;font-size:15px;letter-spacing:.3px}
  .brand .b2{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-top:2px}
  .nav{padding:10px 0;flex:1}
  .nav button{width:100%;text-align:left;background:none;border:none;color:#c9ccd6;padding:11px 18px;font-size:13.5px;
       cursor:pointer;display:flex;align-items:center;gap:10px;border-left:3px solid transparent}
  .nav button:hover{background:#23233e;color:#fff}
  .nav button.on{background:#23233e;color:#fff;border-left-color:var(--gold);font-weight:600}
  .nav .ic{width:18px;text-align:center;opacity:.9}
  .side .foot{padding:12px 18px;border-top:1px solid #2c2c4a;font-size:10px;color:#8990a3}
  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{background:var(--card);border-bottom:1px solid var(--rule);padding:12px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:5}
  .top h1{margin:0;font-size:17px;flex:1}
  .who{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .who select{padding:7px 9px;border:1px solid var(--rule);border-radius:8px;font-size:13px;background:#fff}
  .btn{border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .btn.p{background:var(--accent);color:#fff}
  .btn.g{background:var(--gold);color:#fff}
  .btn.s{background:#eef1ef;color:var(--ink);border:1px solid var(--rule)}
  .btn.d{background:#fff;color:var(--red);border:1px solid #e6c9c7}
  .btn.sm{padding:6px 10px;font-size:12px;border-radius:7px}
  .btn:active{transform:translateY(1px)}
  .wrap{padding:22px;max-width:1100px;width:100%}
  .pagehead{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin:0 0 12px}
  /* cards / grid */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:15px 16px}
  .kpi .l{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .kpi .v{font-size:26px;font-weight:800;margin-top:5px;color:var(--ink)}
  .kpi .v.green{color:var(--accent)}
  .kpi .v.gold{color:var(--gold)}
  .panel{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .panel h2{margin:0 0 12px;font-size:14px}
  .panel h2 .sub{font-size:11px;color:var(--muted);font-weight:500;margin-left:8px}
  /* goal */
  .goal{background:linear-gradient(120deg,var(--ink),var(--ink2));color:#fff;border-radius:16px;padding:20px 22px;margin-bottom:18px}
  .goal .gt{font-size:12px;color:#cdb88a;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .goal .gv{font-size:30px;font-weight:800;margin:4px 0 2px}
  .goal .gv small{font-size:15px;color:#aeb4c5;font-weight:600}
  .bar{height:13px;background:#33334f;border-radius:8px;overflow:hidden;margin-top:12px}
  .bar > div{height:100%;background:linear-gradient(90deg,var(--accent2),var(--gold));border-radius:8px;transition:width .4s}
  .goal .gm{font-size:12px;color:#aeb4c5;margin-top:8px}
  .goal.hit{background:linear-gradient(120deg,#0f5d4a,#13795f)}
  /* table */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--rule)}
  td{padding:9px 10px;border-bottom:1px solid var(--rule);font-size:13px;vertical-align:middle}
  tr:hover td{background:#fafbfa}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;color:#fff}
  .t-available{background:var(--accent)} .t-working{background:var(--gold)}
  .t-closed{background:var(--ink)} .t-reopened{background:var(--blue)} .t-dead{background:var(--red)}
  .rank{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:800;font-size:12px;color:#fff;background:#b9c0c8}
  .rank.r1{background:var(--gold)} .rank.r2{background:#9aa0a6} .rank.r3{background:#b07a42}
  .muted{color:var(--muted);font-size:12px}
  .touchers{font-size:11px;color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:30px;font-style:italic}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;background:#eef1ef;border-radius:9px;padding:3px}
  .seg button{border:none;background:none;padding:7px 13px;font-size:12.5px;font-weight:600;border-radius:7px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  input,select,textarea{font-family:inherit}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
  .field input,.field select,.field textarea{width:100%;padding:9px 10px;border:1px solid var(--rule);border-radius:8px;font-size:13.5px;background:#fff}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,20,35,.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:20;overflow:auto}
  .modal{background:#fff;border-radius:16px;max-width:520px;width:100%;padding:22px}
  .modal h3{margin:0 0 4px;font-size:17px}
  .modal .ms{font-size:12.5px;color:var(--muted);margin-bottom:14px}
  .mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  .pill{font-size:11px;background:#eef1ef;color:var(--muted);padding:3px 9px;border-radius:20px;font-weight:600}
  @media(max-width:820px){
    .side{width:60px} .brand .b1,.brand .b2,.nav button span.lbl,.side .foot{display:none}
    .nav button{justify-content:center;padding:13px 0} .nav .ic{width:auto}
    .kpis{grid-template-columns:1fr 1fr} .grid2{grid-template-columns:1fr}
  }
  .loginwrap{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e,#0f5d4a);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .loginbox{background:#fff;border-radius:18px;padding:30px 28px;width:100%;max-width:362px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
  .loginbrand{font-size:21px;font-weight:800;color:var(--ink)}
  .loginbrand span{display:block;font-size:11px;color:var(--gold);letter-spacing:1.6px;margin-top:3px}
  .loginsub{font-size:13px;color:var(--muted);margin:7px 0 20px}
  .lerr{color:var(--red);font-size:12.5px;min-height:18px;margin-bottom:6px}
  .loginhint{font-size:11.5px;color:var(--muted);margin-top:16px;text-align:center;line-height:1.6;background:#f4f6f5;border-radius:9px;padding:9px}
</style>
<!-- Parsers for file import: SheetJS (CSV/Excel) + PDF.js (PDF text). Loaded
     from CDN; the app guards on these being present before using them. -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
</script>
<!-- Supabase client: real auth + Postgres with row-level security. The anon
     key is public by design; RLS in the database is what enforces access. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  </div>
</div>
<div id="modalRoot"></div>
<div id="login" class="loginwrap">

    <div class="loginbrand">For The People <span>LEAD ENGINE</span></div>
    <div class="loginsub">Sign in to your agent account</div>
    <div class="field"><label>Email</label><input id="luser" type="email" autocomplete="email" placeholder="you@email.com"></div>
    <div class="field"><label>Password <span onclick="togglePw('lpass',this)" style="float:right;cursor:pointer;color:var(--accent);font-weight:700;text-transform:none;letter-spacing:0;font-size:11px">Show</span></label><input id="lpass" type="password" autocomplete="current-password" placeholder="password"></div>
    <div id="lerr" class="lerr"></div>
    <button class="btn p" style="width:100%;padding:12px;font-size:15px" id="loginBtn">Log In</button>
    <button class="btn s" style="width:100%;padding:10px;margin-top:8px" id="signupBtn">Request an agent account</button>
    <div class="loginhint" id="loginhint"></div>
  </div>
</div>

function medMatches(q){ return MEDS.filter(m=> m.name.toLowerCase().includes(q) || (m.aka||[]).some(a=>a.toLowerCase().includes(q))); }
function medCard(m){
  const idx = m.cond? UWGRID.findIndex(r=>r.c.toLowerCase().includes(m.cond.toLowerCase())) : -1;
  const condName = idx>=0? UWGRID[idx].c : null;
  const sel=(S.uwSelected||[]).indexOf(idx)>=0;
  const aka=(m.aka&&m.aka.length)? " ("+m.aka.map(a=>a.replace(/\b\w/g,c=>c.toUpperCase())).join(", ")+")" : "";
  return `<div class="panel" style="padding:12px 16px;margin-bottom:12px;border-left:3px solid var(--blue)">
    <div style="font-weight:700;font-size:13.5px">💊 ${escapeHtml(m.name)}<span class="muted" style="font-weight:500;font-size:11px">${escapeHtml(aka)}</span></div>
    <div style="font-size:12.5px;margin-top:4px">Commonly prescribed for: <b>${escapeHtml(m.treats)}</b></div>
    ${m.note?`<div class="muted" style="font-size:11px;margin-top:3px">⚠ ${escapeHtml(m.note)}</div>`:""}
    ${condName? `<div class="row" style="margin-top:8px"><span class="muted" style="font-size:12px">→ Underwriting: <b>${escapeHtml(condName)}</b></span>
       <button class="btn ${sel?'p':'s'} sm" onclick="toggleUwCond(${idx})">${sel?'✓ Added':'➕ Add to client'}</button></div>`
     : `<div class="muted" style="font-size:11px;margin-top:6px">Usually not a major underwriting concern on its own.</div>`}
  </div>`;
}
// classify a decision: good (write here / immediate), ok (graded/modified/needs review), bad (decline)
function uwClass(t){
  const s=(t||"").toLowerCase();
  if(s.includes("decline") && !/graded|modified|rop|basic|within|allowed|standard|preferred|immediate|guaranteed/.test(s)) return "bad";
  if(/not asked|allowed|preferred|standard|immediate|guaranteed/.test(s)) return "good";
  return "ok";
}
function setUwSearch(v){ S.uwSearch=v; render(); const el=document.getElementById("uwSearch"); if(el){ el.focus(); try{ el.setSelectionRange(v.length,v.length); }catch(e){} } }
function toggleUwCond(idx){ if(!S.uwSelected) S.uwSelected=[]; const p=S.uwSelected.indexOf(idx); if(p>=0) S.uwSelected.splice(p,1); else S.uwSelected.push(idx); render(); }
function clearUwSelected(){ S.uwSelected=[]; render(); }
const UWRANK={good:0,ok:1,bad:2};
function uwCard(r, idx){
  const items=r.v.map((d,i)=>({carrier:UWCARRIERS[i], d, cls:uwClass(d)}));
  const sorted=items.slice().sort((a,b)=>UWRANK[a.cls]-UWRANK[b.cls]);
  const best=items.filter(x=>x.cls==="good").map(x=>x.carrier.split(" · ")[0]);
  const sel=(S.uwSelected||[]).indexOf(idx)>=0;
  return `<div class="panel" style="padding:12px 16px;margin-bottom:12px;${sel?'border-left:3px solid var(--accent)':''}">
    <div class="row" style="justify-content:space-between;margin-bottom:8px">
      <div style="font-weight:700;font-size:13.5px">${escapeHtml(r.c)}</div>
      <button class="btn ${sel?'p':'s'} sm" onclick="toggleUwCond(${idx})">${sel?'✓ Added to client':'➕ Add to client'}</button>
    </div>
    ${best.length?`<div class="muted" style="font-size:11px;margin-bottom:8px">✅ Write here: <b style="color:var(--accent)">${best.map(escapeHtml).join(", ")}</b></div>`:`<div class="muted" style="font-size:11px;margin-bottom:8px;color:var(--gold)">No immediate-coverage carrier — best available below</div>`}
    ${sorted.map(x=>{const col=x.cls==="good"?"var(--accent)":x.cls==="bad"?"var(--red)":"var(--gold)";const dot=x.cls==="good"?"🟢":x.cls==="bad"?"🔴":"🟡";
      return `<div style="display:flex;gap:8px;padding:6px 0;border-top:1px solid var(--rule);font-size:12.5px;align-items:baseline">
        <div style="flex:0 0 160px"><b>${escapeHtml(x.carrier.split(" · ")[0])}</b><div class="muted" style="font-size:10px">${escapeHtml(x.carrier.split(" · ")[1]||"")}</div></div>
        <div style="flex:1;color:${col}">${dot} ${escapeHtml(x.d)}</div>
      </div>`;}).join("")}
  </div>`;
}
// For a client with several conditions, each carrier's standing = its WORST
// decision across all selected conditions (one decline anywhere => carrier declines).
function uwClientResults(sel){
  return UWCARRIERS.map((carrier,ci)=>{
    const detail=sel.map(idx=>{ const r=UWGRID[idx]; const d=r.v[ci]; return {cond:r.c, d, cls:uwClass(d)}; });
    const worst=detail.reduce((w,x)=> UWRANK[x.cls]>UWRANK[w]?x.cls:w, "good");
    return {carrier, cls:worst, detail};
  }).sort((a,b)=>UWRANK[a.cls]-UWRANK[b.cls]);
}
function renderUwClientPanel(){
  const sel=S.uwSelected||[]; if(!sel.length) return "";
  const res=uwClientResults(sel);
  const writers=res.filter(x=>x.cls==="good").map(x=>x.carrier.split(" · ")[0]);
  const graded=res.filter(x=>x.cls==="ok").map(x=>x.carrier.split(" · ")[0]);
  const head = writers.length
    ? `🟢 <b style="color:var(--accent)">Write immediate: ${writers.map(escapeHtml).join(", ")}</b>`
    : (graded.length ? `🟡 No immediate carrier — best available (graded/modified): <b style="color:var(--gold)">${graded.map(escapeHtml).join(", ")}</b>`
                      : `🔴 <b style="color:var(--red)">No carrier on this grid approves this client — all decline</b>`);
  return `<div class="panel" style="border-left:3px solid var(--accent)">
    <div class="row" style="justify-content:space-between;margin-bottom:8px">
      <h2 style="margin:0">Best Carrier for This Client <span class="sub">${sel.length} condition${sel.length===1?'':'s'}</span></h2>
      <button class="btn s sm" onclick="clearUwSelected()">Clear</button>
    </div>
    <div class="row" style="margin-bottom:10px">${sel.map(i=>`<span class="pill">${escapeHtml(UWGRID[i].c)} <b style="cursor:pointer;margin-left:3px" onclick="toggleUwCond(${i})">✕</b></span>`).join("")}</div>
    <div style="font-size:13px;margin-bottom:10px">${head}</div>
    ${res.map(x=>{const col=x.cls==="good"?"var(--accent)":x.cls==="bad"?"var(--red)":"var(--gold)";const dot=x.cls==="good"?"🟢":x.cls==="bad"?"🔴":"🟡";
      return `<div style="padding:8px 0;border-top:1px solid var(--rule)">
        <div style="font-weight:700;font-size:13px;color:${col}">${dot} ${escapeHtml(x.carrier.split(" · ")[0])} <span class="muted" style="font-weight:500;font-size:10px">${escapeHtml(x.carrier.split(" · ")[1]||"")}</span></div>
        ${x.detail.map(dd=>{const c2=dd.cls==="good"?"var(--accent)":dd.cls==="bad"?"var(--red)":"var(--gold)";
          return `<div style="font-size:11px;margin-top:3px"><span class="muted">${escapeHtml(dd.cond)}:</span> <span style="color:${c2}">${escapeHtml(dd.d)}</span></div>`;}).join("")}
      </div>`;}).join("")}
  </div>`;
}
function renderUnderwriting(){
  const q=(S.uwSearch||"").trim().toLowerCase();
  const rows=UWGRID.map((r,idx)=>({r,idx})).filter(x=> !q || x.r.c.toLowerCase().includes(q));
  const meds = q? medMatches(q) : [];
  const nothing = q && !rows.length && !meds.length;
  return `
  <div class="panel">
    <h2>Underwriting Guide <span class="sub">search a condition or medication → which carrier writes the client</span></h2>
    <input id="uwSearch" value="${escapeHtml(S.uwSearch||'')}" oninput="setUwSearch(this.value)" placeholder="🔍 Search a condition or Rx — diabetes, eliquis, metformin, copd, keppra…" style="width:100%;padding:11px 12px;border:1px solid var(--rule);border-radius:8px;font-size:14px;margin-bottom:6px">
    <div class="muted" style="font-size:11px">Type a <b>medication</b> to find the condition it points to, or a condition directly. <b>➕ Add</b> a client's conditions to see which carrier approves them all &nbsp;·&nbsp; 🟢 immediate &nbsp; 🟡 graded/modified &nbsp; 🔴 decline. Guide only — confirm with the client.</div>
  </div>
  ${renderUwClientPanel()}
  ${meds.map(medCard).join("")}
  ${rows.map(x=>uwCard(x.r,x.idx)).join("")}
  ${nothing? `<div class="panel"><div class="empty">No condition or medication matches "${escapeHtml(q)}". Try a shorter word (e.g. "heart", "eliquis", "diab").</div></div>`:''}
  `;
}

/* ---------- load everything from Supabase ---------- */
async function loadAll(){
  const [pr, lr, dr] = await Promise.all([
    SB.from("profiles").select("*"),
    SB.from("leads").select("*"),
    SB.from("deals").select("*")
  ]);
  if(pr.error) throw pr.error;   // can't function without profiles
  S.agents = (pr.data||[]).map(profileFromRow);
  S.leads  = (lr.data||[]).map(leadFromRow);
  S.deals  = (dr.data||[]).map(dealFromRow);
}

// After a valid Supabase session: load data, then enforce approved status.
async function afterLogin(session){
  S.session=session; S.me=session.user.id;
  try { await loadAll(); }
  catch(e){
    console.error("loadAll failed", e);
    try{ await SB.auth.signOut(); }catch(_){}
    S.me=null; S.session=null; showLogin();
    const el=document.getElementById("lerr"); if(el){ el.style.color="var(--red)"; el.textContent="Couldn't reach the server — check your connection and try again."; }
    return;
  }
  const me=agentById(S.me);
  if(!me || (me.role!=="owner" && me.status!=="active")){
    await SB.auth.signOut(); S.me=null; S.session=null;
    showLogin();
    const el=document.getElementById("lerr");
    if(el){ el.style.color=""; el.textContent = (me&&me.status==="rejected")?"Your access request was declined. Contact your admin.":"Your account is awaiting admin approval."; }
    return;
  }
  showApp();
}
async function doLogin(){
  const errEl=document.getElementById("lerr"); errEl.style.color=""; errEl.textContent="";
  const email=(document.getElementById("luser").value||"").trim();
  const pass=document.getElementById("lpass").value;
  if(!email||!pass){ errEl.textContent="Enter your email and password."; return; }
  errEl.textContent="Signing in…";
  const { data, error } = await SB.auth.signInWithPassword({ email, password:pass });
  if(error){ errEl.textContent=error.message||"Invalid email or password."; return; }
  errEl.textContent="";
  await afterLogin(data.session);
}

function withinDays(dateStr, days){
  if(!dateStr) return false;
  const d=new Date(dateStr), now=new Date();

}

/* ---------- dial counter (counts each "Called") ---------- */
function startOfTodayMs(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function startOfWeekMs(){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); return d.getTime(); } // week starts Sunday
// A note is a logged call if flagged, or matches a call-log shape (markCalled
// "📞…", logCall "Called …", or a "[Disposition]…" prefix). Save-Note text won't match.
function isCallNote(x){ const t=(x&&x.text)||""; return !!(x&&(x.call || /📞/.test(t) || /^Called /.test(t) || /^\[[A-Za-z]/.test(t))); }
function dialCount(agentName, sinceMs){
  let n=0;
  S.leads.forEach(l=>(l.notes||[]).forEach(x=>{
    if(x.agent===agentName && isCallNote(x)){
      if(!sinceMs || new Date(x.ts).getTime()>=sinceMs) n++;
    }
  }));
  return n;
}
const myDials = sinceMs => dialCount(meName(), sinceMs);
// Aggregate dials per agent since a timestamp → [{key, dials}] sorted desc.
function dialsBy(sinceMs){
  const m={};
  S.leads.forEach(l=>(l.notes||[]).forEach(x=>{
    if(x.agent && isCallNote(x) && (!sinceMs || new Date(x.ts).getTime()>=sinceMs)){
      m[x.agent]=(m[x.agent]||0)+1;
    }
  }));
  return Object.entries(m).map(([key,dials])=>({key,dials})).sort((a,b)=>b.dials-a.dials);
}

/* ---------- pipeline staleness / upline alerts ---------- */
const STALE_DAYS = 5;
// How long a lead has been in this agent's pipeline: days since their first
// contact with it (earliest note they authored, else last call date).
function leadAgeDays(l, agentName){
  let firstTs=null;
  (l.notes||[]).forEach(n=>{ if(n.agent===agentName && (!firstTs || n.ts<firstTs)) firstTs=n.ts; });
  let baseMs=null;
  if(firstTs) baseMs=new Date(firstTs).getTime();
  else if(l.last_called_date) baseMs=new Date(l.last_called_date+"T00:00:00").getTime();
  if(!baseMs) return 0;
  return Math.floor((Date.now()-baseMs)/(1000*60*60*24));
}
// Open leads in a given agent's pipeline that have gone stale (> STALE_DAYS).
function staleLeadsFor(agentName){
  return S.leads.filter(l=>
    (l.touched_by||[]).includes(agentName) &&
    l.status!=="closed" && l.status!=="dead" &&
    !((l.dismissed_by||[]).includes(agentName)) &&
    leadAgeDays(l, agentName) > STALE_DAYS
  );
}
// Agents I'm the upline for. Owner sees the whole org; a manager sees direct downline.
function downlineAgents(){
  const me=meObj();
  if(isOwner()) return S.agents.filter(a=>a.role!=="owner" && a.name!==me.name);
  return S.agents.filter(a=>a.upline===me.name);
}

const IMPORT_GAP_DAYS = 7;
function parseBatchDate(b){ const m=String(b||"").match(/\d{4}-\d{2}-\d{2}/); return m?m[0]:null; }
function daysSince(dateStr){ if(!dateStr) return Infinity; return Math.floor((Date.now()-new Date(dateStr+"T00:00:00").getTime())/(1000*60*60*24)); }
// Most recent date an agent imported leads (imported_at, else date in import_batch).
function lastImportDate(agentName){
  let latest=null;
  S.leads.forEach(l=>{
    if(l.imported_by!==agentName) return;
    const d=l.imported_at||parseBatchDate(l.import_batch);
    if(d && (!latest || d>latest)) latest=d;
  });
  return latest;
}

function commRate(carrier,product,level){ const p=COMM.find(x=>x.carrier===carrier&&x.product===product); if(!p) return null; const r=p.rates[LEVELS.indexOf(level)]; return (r==null)?null:r; }
function setComm(field,val){ S[field]= field==="commLevel"?Number(val):val; if(field==="commCarrier"){ const ps=COMM.filter(x=>x.carrier===val); S.commProduct=ps[0]?ps[0].product:""; } render(); }
function setCommMode(m){ S.commMode=m; render(); }
function onCommInput(v){ S.commMonthly=v; updateCommOut(); }   // no full render → cursor stays put
function commCalc(){
  const level=S.commLevel||100;
  const amt=parseFloat(S.commMonthly)||0;
  const ap=Math.round((S.commMode==="annual"?amt:amt*12)*100)/100;
  const carriers=[...new Set(COMM.map(x=>x.carrier))];
  const carrier=COMM.some(x=>x.carrier===S.commCarrier)? S.commCarrier : carriers[0];
  const prods=COMM.filter(x=>x.carrier===carrier);
  const product=(prods.find(p=>p.product===S.commProduct)? S.commProduct : (prods[0]&&prods[0].product));
  const r=commRate(carrier,product,level);
  const pay=(r!=null)? ap*r/100 : null;

function aggBy(field){
  const m={};
  activeDeals().forEach(d=>{
    const k = field==="closed_by"? d.closed_by : field==="closer_team"? d.closer_team : d.closer_upline;
    if(!k) return;
    if(!m[k]) m[k]={key:k,count:0,ap:0,team:d.closer_team,upline:d.closer_upline};
    m[k].count++; m[k].ap+=Number(d.annual_ap||0);
  });
  return Object.values(m).sort((a,b)=>b.ap-a.ap);
}

// Log that the current agent called/made contact with this lead. The lead
// STAYS in the shared pool — calling never claims it. Everyone can see who
// has connected (touched_by) and who called last.
async function markCalled(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(!agentById(S.me)){ alert("Your profile isn't loaded — click ↻ Refresh, then try again."); return; }
  l.times_worked=(l.times_worked||0)+1;
  l.last_called_by=meName(); l.last_called_date=today();
  if(!l.touched_by) l.touched_by=[];
  if(!l.touched_by.includes(meName())) l.touched_by.push(meName());
  // calling a lead again brings it back into my pipeline
  if(l.dismissed_by) l.dismissed_by=l.dismissed_by.filter(n=>n!==meName());
  if(!l.notes) l.notes=[];
  l.notes.push({ts:new Date().toISOString(), agent:meName(), text:"📞 Logged a call", call:true});
  await saveLead(l); render();
}
// Remove a lead from MY pipeline only. It stays in the shared pool and keeps
// its full history; calling it again re-adds it.
async function removeFromPipeline(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(!confirm("Remove this lead from your pipeline? It stays in the shared pool and its history is kept.")) return;
  if(!l.dismissed_by) l.dismissed_by=[];
  if(!l.dismissed_by.includes(meName())) l.dismissed_by.push(meName());
  await saveLead(l); render();
}

async function doImport(){
  const raw=document.getElementById("impBox").value.trim();
  const by=document.getElementById("impBy").value;
  const batch="up-"+Date.now().toString(36);   // unique id for this upload
  if(!raw){ alert("Paste at least one lead."); return; }
  let added=0, skipped=0, dupes=0; const toAdd=[];
  const seenPh=new Set(), seenEm=new Set();
  raw.split(/\r?\n/).forEach(line=>{
    if(!line.trim()) return;
    const cells=line.split(/[,\t]/).map(s=>s.trim());   // commas or tabs
    if(isHeaderRow(cells)) return;                        // ignore a pasted header line
    const l=parseLeadCells(cells);
    if(!l.name){ skipped++; return; }                    // no detectable name → skip
    const ph=String(l.phone||"").replace(/\D/g,""); const em=(l.email||"").toLowerCase();
    if(isExistingLead(l) || (ph.length>=7 && seenPh.has(ph)) || (em && seenEm.has(em))){ dupes++; return; }
    if(ph.length>=7) seenPh.add(ph); if(em) seenEm.add(em);
    toAdd.push({name:l.name, phone:l.phone||"", state:(l.state||"").toUpperCase(), age:Number(l.age||0), email:l.email||"", dob:l.dob||"", gender:l.gender||"",
      address:l.address||"", city:l.city||"", zip:l.zip||"",
      imported_by:by, import_batch:batch, imported_at:today(), status:"available", current_owner:null,
      touched_by:[], times_worked:0, last_called_by:null, last_called_date:null});
    added++;
  });
  if(toAdd.length) await insertLeads(toAdd);
  await loadAll(); document.getElementById("impBox").value=""; render();
  alert(added+" lead"+(added===1?"":"s")+" added to the pool."
    +(dupes?(" "+dupes+" duplicate"+(dupes===1?"":"s")+" skipped."):"")
    +(skipped?(" "+skipped+" line"+(skipped===1?"":"s")+" skipped — no name."):""));
}

/* ---------- file import: CSV / Excel / PDF ---------- */
let pendingImport = [];

/* ---------- smart field detection ----------
   Identify name / phone / state / age / email by CONTENT so columns can be in
   any order, and mislabeled or unlabeled files still parse correctly. */
const US_STATES={AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",CT:"Connecticut",DE:"Delaware",FL:"Florida",GA:"Georgia",HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming",DC:"District of Columbia"};
const STATE_NAME_TO_CODE=(()=>{const m={};Object.keys(US_STATES).forEach(k=>{m[US_STATES[k].toLowerCase()]=k;});return m;})();
function isEmail(c){ return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(c==null?"":c).trim()); }
function digitsOf(c){ return String(c==null?"":c).replace(/\D/g,""); }
function isPhoneCell(c){ const s=String(c==null?"":c).trim(); const d=digitsOf(s); return (d.length===10||(d.length===11&&d[0]==="1")) && /^[+\d\s()\-.]+$/.test(s); }
function formatPhone(c){ let d=digitsOf(c); if(d.length>11) d=d.slice(-10); if(d.length===11&&d[0]==="1") d=d.slice(1); if(d.length===10) return "("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6); return String(c==null?"":c).trim(); }
function toStateCode(c){ const s=String(c==null?"":c).replace(/[^A-Za-z ]/g,"").trim(); if(!s) return ""; const up=s.toUpperCase(); if(/^[A-Z]{2}$/.test(up)&&US_STATES[up]) return up; return STATE_NAME_TO_CODE[s.toLowerCase()]||""; }
function isAgeCell(c){ const s=String(c==null?"":c).trim(); if(!/^\d{1,3}$/.test(s)) return false; const n=Number(s); return n>=1&&n<=120; }
function looksLikeName(c){ const s=String(c==null?"":c).trim(); return s!=="" && /[A-Za-z]/.test(s) && !/\d/.test(s) && !/@/.test(s); }
// recognizes both M/D/Y (e.g. 8/30/1973) and ISO Y-M-D (e.g. 1954-09-11)
function isDobCell(c){ const s=String(c==null?"":c).trim(); return /^\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4}$/.test(s) || /^\d{4}[\/\-.]\d{1,2}[\/\-.]\d{1,2}$/.test(s); }
function genderOf(c){ const s=String(c==null?"":c).trim().toLowerCase(); if(/^(male|m)$/.test(s)) return "Male"; if(/^(female|f)$/.test(s)) return "Female"; if(/^(nonbinary|non-binary|nb|other)$/.test(s)) return "Other"; return ""; }
// Spreadsheet readers turn date cells into Excel serial numbers (e.g. 19978);
// convert those back to a real ISO date so DOB stores cleanly and age computes.
function normalizeDob(v){
  const s=String(v==null?"":v).trim();
  if(!s) return "";
  if(/^#+$/.test(s) || /^n\/?a$/i.test(s)) return "";   // Excel "####" or "N/A"
  if(/^\d{4,5}$/.test(s)){ const n=+s; if(n>=1000 && n<=80000){ const d=new Date(Date.UTC(1899,11,30)+n*86400000); if(!isNaN(d.getTime())) return d.toISOString().slice(0,10); } }
  return s;
}
function ageFromDob(dob){
  const s=String(dob||"").trim();
  let y,mo,d, m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);   // ISO: 1954-09-11
  if(m){ y=+m[1]; mo=+m[2]; d=+m[3]; }
  else { m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/); if(!m) return 0; mo=+m[1]; d=+m[2]; y=+m[3]; if(y<100) y+=(y>30?1900:2000); }
  const b=new Date(y,mo-1,d); if(isNaN(b.getTime())) return 0;
  const now=new Date(); let a=now.getFullYear()-b.getFullYear();
  const md=now.getMonth()-b.getMonth(); if(md<0||(md===0&&now.getDate()<b.getDate())) a--;
  return (a>=0&&a<=120)?a:0;
}

// Classify one row of cells into a lead, purely by content (order-independent).
function parseLeadCells(cells){
  const arr=(cells||[]).map(c=>String(c==null?"":c).trim()).filter(c=>c!=="");
  const out={name:"",phone:"",state:"",age:0,email:"",dob:"",gender:""};
  const used=new Array(arr.length).fill(false);
  arr.forEach((c,i)=>{ if(!out.email && isEmail(c)){ out.email=c.toLowerCase(); used[i]=true; } });
  arr.forEach((c,i)=>{ if(used[i]||out.phone) return; if(isPhoneCell(c)){ out.phone=formatPhone(c); used[i]=true; } });
  arr.forEach((c,i)=>{ if(used[i]||out.dob) return; if(isDobCell(c)){ out.dob=c; used[i]=true; } });
  arr.forEach((c,i)=>{ if(used[i]||out.gender) return; if(/^(male|female|nonbinary|non-binary|other)$/i.test(c)){ out.gender=genderOf(c); used[i]=true; } });
  arr.forEach((c,i)=>{ if(used[i]||out.state) return; const st=toStateCode(c); if(st){ out.state=st; used[i]=true; } });
  arr.forEach((c,i)=>{ if(used[i]||out.age) return; if(isAgeCell(c)){ out.age=Number(c); used[i]=true; } });
  if(!out.age && out.dob) out.age=ageFromDob(out.dob);
  // whatever alphabetic text is left is the name (covers "First Last" or split First/Last)
  const parts=[];
  arr.forEach((c,i)=>{ if(used[i]) return; if(looksLikeName(c)){ parts.push(c); used[i]=true; } });
  out.name=parts.join(" ").replace(/\s+/g," ").trim();
  return out;
}

// True only when a row looks like column LABELS, not data — guards against real
// data (emails/phones/ages) being mistaken for a header.
function isHeaderRow(cells){
  const c=(cells||[]).map(x=>String(x==null?"":x).trim()).filter(x=>x!=="");
  if(!c.length) return false;
  if(c.some(isEmail)||c.some(isPhoneCell)||c.some(isAgeCell)) return false;
  const kw=/\b(name|first|last|full|fname|lname|phone|number|cell|mobile|tel|state|st|province|region|age|e-?mail|client|contact|lead)\b/i;
  if(!c.some(x=>kw.test(x))) return false;
  // header labels can be long question columns; just require letters + no @
  return c.every(x=>x.length<=80 && /[A-Za-z]/.test(x) && !/@/.test(x));
}

// Map header labels to column indices (used when a header row is present).
// Handles "F Name"/"L Name", "First Name"/"Last Name", DOB, Gender, etc.
function mapColumns(headerRow){
  const idx={name:-1,first:-1,last:-1,phone:-1,state:-1,age:-1,email:-1,dob:-1,gender:-1,address:-1,city:-1,zip:-1};
  (headerRow||[]).forEach((h,i)=>{
    const k=String(h==null?"":h).toLowerCase().trim();
    if(idx.email<0 && /e-?mail/.test(k)) idx.email=i;
    else if(idx.gender<0 && /(gender|sex)/.test(k)) idx.gender=i;
    else if(idx.dob<0 && /(^dob$|date of birth|birth ?date|birthday|\bdob\b)/.test(k)) idx.dob=i;
    else if(idx.zip<0 && /(zip|postal)/.test(k)) idx.zip=i;
    else if(idx.city<0 && /(^city$|town)/.test(k)) idx.city=i;
    else if(idx.address<0 && /(^address|street|addr)/.test(k)) idx.address=i;
    else if(idx.first<0 && /^(first|fname|f[\s._-]*name|given)/.test(k)) idx.first=i;
    else if(idx.last<0 && /^(last|lname|l[\s._-]*name|surname|family)/.test(k)) idx.last=i;
    else if(idx.name<0 && /(^name$|full ?name|lead ?name|client|contact)/.test(k)) idx.name=i;
    else if(idx.phone<0 && /(phone|number|cell|mobile|^tel)/.test(k)) idx.phone=i;
    else if(idx.state<0 && /(^state$|^st$|province|region)/.test(k)) idx.state=i;
    else if(idx.age<0 && /(^age$|^age\b)/.test(k)) idx.age=i;
  });
  return idx;
}
function leadFromHeader(cells, idx){
  const get=i=> (i>=0 && i<cells.length)? String(cells[i]==null?"":cells[i]).trim() : "";
  let name=get(idx.name);
  if(!name && (idx.first>=0 || idx.last>=0)){
    const fn=get(idx.first), ln=get(idx.last);
    name=(fn===ln ? fn : (fn+" "+ln)).replace(/\s+/g," ").trim();   // dedupe when First==Last
  }
  const dob=normalizeDob(get(idx.dob));
  const ageM=get(idx.age).match(/\d{1,3}/);
  let age = ageM? Number(ageM[0]) : 0;
  if(!age && dob) age=ageFromDob(dob);
  return {
    name,
    phone: get(idx.phone)? formatPhone(get(idx.phone)) : "",
    state: toStateCode(get(idx.state)) || get(idx.state).toUpperCase(),
    age,
    email: isEmail(get(idx.email))? get(idx.email).toLowerCase() : get(idx.email),
    dob: dob||"",
    gender: genderOf(get(idx.gender)) || get(idx.gender) || "",
    address: get(idx.address),
    city: get(idx.city),
    zip: get(idx.zip)
  };
}

// Convert raw rows (array of cell-arrays) into normalized lead objects.
function rowsToLeads(rows){
  rows=(rows||[]).filter(r=>r && r.some(c=>String(c==null?"":c).trim()!==""));
  if(!rows.length) return [];
  let idx=null, start=0;
  if(isHeaderRow(rows[0])){ idx=mapColumns(rows[0]); start=1; }
  const leads=[];
  for(let i=start;i<rows.length;i++){
    const cells=(rows[i]||[]).map(c=>String(c==null?"":c).trim());
    if(!cells.some(c=>c!=="")) continue;
    let lead = idx ? leadFromHeader(cells, idx) : parseLeadCells(cells);
    if(idx){ // backfill anything the header didn't cover, by content
      const auto=parseLeadCells(cells);
      if(!lead.name)   lead.name=auto.name;
      if(!lead.phone)  lead.phone=auto.phone;
      if(!lead.state)  lead.state=auto.state;
      if(!lead.age)    lead.age=auto.age;
      if(!lead.email)  lead.email=auto.email;
      if(!lead.dob)    lead.dob=auto.dob;
      if(!lead.gender) lead.gender=auto.gender;
    }
    // require a real way to contact them — drops legend/decoration rows
    const hasContact=(lead.email && isEmail(lead.email)) || String(lead.phone||"").replace(/\D/g,"").length>=10;
    if(lead.name && hasContact) leads.push(lead);
  }
  return leads;
}
async function parseSpreadsheet(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:""});
  return rowsToLeads(rows);
}
async function parsePdf(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const lines=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const byY={};
    tc.items.forEach(it=>{ const y=Math.round(it.transform[5]); (byY[y]=byY[y]||[]).push(it); });
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const row=byY[y].sort((a,b)=>a.transform[4]-b.transform[4]).map(i=>i.str).join(" ").replace(/\s+/g," ").trim();
      if(row) lines.push(row);
    });
  }
  // split each visual line into cells on commas, pipes, tabs, or runs of 2+ spaces
  const rows=lines.map(l=>l.split(/\s*[,|\t]\s*|\s{2,}/).map(s=>s.trim()).filter(s=>s!==""));
  return rowsToLeads(rows);
}
async function processImportFile(file){
  if(!file) return;
  const nm=file.name.toLowerCase();
  const prev=document.getElementById("impPreview");
  if(prev) prev.innerHTML='<div class="muted" style="padding:6px 0">Reading <b>'+escapeHtml(file.name)+'</b>…</div>';
  try{
    let leads=[];
    if(nm.endsWith(".pdf")){
      if(typeof pdfjsLib==="undefined"){ if(prev) prev.textContent="PDF reader still loading — try again in a moment."; return; }
      leads=await parsePdf(file);
    } else if(nm.endsWith(".csv")||nm.endsWith(".xlsx")||nm.endsWith(".xls")){
      if(typeof XLSX==="undefined"){ if(prev) prev.textContent="Spreadsheet reader still loading — try again in a moment."; return; }
      leads=await parseSpreadsheet(file);
    } else { if(prev) prev.innerHTML='<div style="color:var(--red)">Unsupported file. Use CSV, Excel (.xlsx/.xls), or PDF.</div>'; return; }
    pendingImport=leads;
    renderImportPreview(file.name);
  }catch(err){
    if(prev) prev.innerHTML='<div style="color:var(--red)">Could not read that file: '+escapeHtml(String(err&&err.message||err))+'</div>';
  }
}

// Duplicate detection: same phone (>=7 digits) or same email as an existing lead.
function leadPhoneDigits(l){ return String(l.phone||"").replace(/\D/g,""); }
function isExistingLead(lead){
  const ph=leadPhoneDigits(lead), em=(lead.email||"").toLowerCase();
  return S.leads.some(l=> (ph && ph.length>=7 && leadPhoneDigits(l)===ph) || (em && (l.email||"").toLowerCase()===em) );
}
async function commitImport(){
  if(!pendingImport.length) return;
  const sel=document.getElementById("impBy");
  const by= sel? sel.value : meName();
  const batch="up-"+Date.now().toString(36);   // unique id for this upload
  let added=0, dupes=0; const toAdd=[];
  const seenPh=new Set(), seenEm=new Set();
  pendingImport.forEach(l=>{
    if(!l.name) return;
    const ph=String(l.phone||"").replace(/\D/g,""); const em=(l.email||"").toLowerCase();
    if(isExistingLead(l) || (ph.length>=7 && seenPh.has(ph)) || (em && seenEm.has(em))){ dupes++; return; }
    if(ph.length>=7) seenPh.add(ph); if(em) seenEm.add(em);
    toAdd.push({name:l.name, phone:l.phone||"", email:l.email||"", dob:l.dob||"", gender:l.gender||"", state:(l.state||"").toUpperCase(), age:Number(l.age||0),
      address:l.address||"", city:l.city||"", zip:l.zip||"",
      imported_by:by, import_batch:batch, imported_at:today(), status:"available", current_owner:null,
      touched_by:[], times_worked:0, last_called_by:null, last_called_date:null});
    added++;
  });
  pendingImport=[];
  if(toAdd.length) await insertLeads(toAdd);
  await loadAll(); render();
  alert(added+" lead"+(added===1?"":"s")+" imported and added to the pool."+(dupes?(" "+dupes+" duplicate"+(dupes===1?"":"s")+" skipped."):""));
}

/* ---------- sorting (lead tables) ---------- */
// compare helper used by the pool table; sorts by name or state, asc/desc.
function sortLeads(leads){
  const {key,dir}=S.poolSort||{key:"name",dir:"asc"};
  const mul=dir==="desc"?-1:1;
  // value used for comparison per sort key. Leads with no appointment sort
  // to the bottom (ascending) so booked leads surface first.
  const val=l=>{
    if(key==="age") return Number(l.age)||0;                         // numeric
    if(key==="appt") return l.followup_date? (l.followup_date+(l.followup_time||"")) : "9999-99-99";
    return String(l[key]||"").toLowerCase();
  };
  return leads.slice().sort((a,b)=>{
    const av=val(a), bv=val(b);
    if(av<bv) return -1*mul;
    if(av>bv) return 1*mul;
    const an=String(a.name||"").toLowerCase(), bn=String(b.name||"").toLowerCase();
    return an<bn?-1:an>bn?1:0; // tie-breaker: name
  });
}
function setPoolSort(key){
  if(!S.poolSort) S.poolSort={key:"name",dir:"asc"};
  if(S.poolSort.key===key){ S.poolSort.dir = S.poolSort.dir==="asc"?"desc":"asc"; }
  else { S.poolSort={key,dir:"asc"}; }
  render();
}
function sortArrow(key){
  const s=S.poolSort||{key:"name",dir:"asc"};
  if(s.key!==key) return ' <span class="muted" style="font-weight:400">↕</span>';
  return s.dir==="asc"? ' ▲':' ▼';
}

// Group leads by the upload they came in on (newest first).
function uploadBatches(){
  const m={};
  S.leads.forEach(l=>{ const b=l.import_batch||"(unknown)";
    if(!m[b]) m[b]={batch:b, count:0, by:l.imported_by||"—", when:l.created_at||l.imported_at||""};
    m[b].count++;
    if(l.created_at && (!m[b].when || l.created_at<m[b].when)) m[b].when=l.created_at;
  });
  return Object.values(m).sort((a,b)=> String(b.when).localeCompare(String(a.when)));
}

function fmtDate(s){ if(!s) return "—"; const d=new Date(s+"T00:00:00"); return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
// DOB display as MM-DD-YYYY (stored as ISO YYYY-MM-DD for age math)
function fmtDob(s){ const m=String(s||"").match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/); return m? (m[2].padStart(2,"0")+"-"+m[3].padStart(2,"0")+"-"+m[1]) : String(s||""); }
function fmtWhen(ts){ const d=new Date(ts); return d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }

function fmtTime(t){ if(!t) return ""; const [h,m]=t.split(":").map(Number); const ap=h>=12?"PM":"AM"; const hh=((h+11)%12)+1; return hh+":"+String(m).padStart(2,"0")+" "+ap; }
function schedBadge(l){

  return `<span class="tag" style="background:${col}">${txt}</span>`;

    const chips=items.slice(0,4).map(l=>{
      const appt=l.followup_kind==='appointment', col=appt?'var(--blue)':'var(--accent)';
      const label=(appt&&l.followup_time? l.followup_time+' ':'')+(l.name||'');
      return `<div onclick="openLead('${l.id}')" title="${escapeHtml((l.name||'')+(l.followup_set_by?' · '+l.followup_set_by:''))}" style="cursor:pointer;font-size:10.5px;color:#fff;background:${col};border-radius:5px;padding:2px 5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(label)}</div>`;
    }).join("");
    const more=items.length>4?`<div class="muted" style="font-size:10px;margin-top:2px">+${items.length-4} more</div>`:"";
    cells+=`<div style="background:#fff;border:1px solid ${isToday?'var(--gold)':'var(--rule)'};border-radius:8px;min-height:92px;padding:5px">
      <div style="font-size:11px;font-weight:700;color:${isToday?'var(--gold)':'var(--muted)'}">${d}</div>${chips}${more}</div>`;
  }
  const total=Object.values(byDate).reduce((s,a)=>s+a.length,0);
  return `
  <div class="panel">
    <div class="row" style="justify-content:space-between;margin-bottom:12px">
      <h2 style="margin:0">${monthName} <span class="sub">${total} scheduled${isOwner()?' · all agents':''}</span></h2>
      <div class="row"><button class="btn s sm" onclick="calNav(-1)">◀ Prev</button><button class="btn s sm" onclick="calToday()">Today</button><button class="btn s sm" onclick="calNav(1)">Next ▶</button></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px">
      ${dow.map(d=>`<div class="muted" style="text-align:center;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">${cells}</div>
    <div class="row muted" style="margin-top:12px;font-size:11px;gap:16px">
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--blue);border-radius:3px;vertical-align:middle"></span> Appointment</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:3px;vertical-align:middle"></span> Follow-up / callback</span>
      ${total===0?`<span>· nothing scheduled this month</span>`:''}
    </div>
  </div>`;
}

// Admin-only: agents who haven't uploaded leads in more than IMPORT_GAP_DAYS.
function renderImportAlerts(){
  if(!isOwner()) return "";
  const flagged=S.agents
    .filter(a=>a.role!=="owner")
    .map(a=>{ const last=lastImportDate(a.name); return {a, last, days:daysSince(last)}; })
    .filter(x=>x.days>IMPORT_GAP_DAYS)
    .sort((x,y)=>y.days-x.days);
  if(!flagged.length) return "";
  return `<div class="panel" style="border-left:3px solid var(--gold)">
    <h2>📥 Import Activity Alert <span class="sub">agents who haven't uploaded leads in over ${IMPORT_GAP_DAYS} days</span></h2>
    <table><thead><tr><th>Agent</th><th>Team</th><th>Last upload</th></tr></thead><tbody>
    ${flagged.map(x=>`<tr>
      <td><b>${escapeHtml(x.a.name)}</b></td>
      <td><span class="pill">${escapeHtml(x.a.team||'—')}</span></td>
      <td style="color:var(--red)"><b>${x.last? (x.days+' days ago · '+fmtDate(x.last)) : 'never uploaded'}</b></td>
    </tr>`).join("")}
    </tbody></table>
  </div>`;
}
function renderDueFollowupsPanel(){
  const due=followupsDue(); if(!due.length) return "";
  return `<div class="panel" style="border-left:3px solid var(--gold)">
    <h2>Due Today <span class="sub">${due.length} follow-up/appointment${due.length===1?'':'s'} to handle</span></h2>
    <table><tbody>${due.map(l=>{
      return `<tr><td><a href="#" onclick="openLead('${l.id}');return false"><b>${l.name}</b></a> <span class="muted">${l.phone}</span>
        <div class="muted">${l.followup_kind==="appointment"?"Appointment":"Follow-up"} · set by ${l.followup_set_by||'—'}</div></td>
      <td style="text-align:right;white-space:nowrap">${schedBadge(l)}&nbsp;<button class="btn p sm" onclick="openLead('${l.id}')">Open</button></td></tr>`;}).join("")}</tbody></table>
  </div>`;
}

/* lead detail modal: call notes + follow-up */
function openLead(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(!l.notes) l.notes=[];
  // Only an admin/owner or the person who imported the lead may edit its
  // name / phone / email.
  const canEdit = isOwner() || (l.imported_by && l.imported_by===meName());
  const fuLabel=l.followup_date? `<span class="pill" style="background:#eef3f1;color:${l.followup_kind==='appointment'?'var(--blue)':'var(--accent)'}">${l.followup_kind==='appointment'?'Appointment':'Follow-up'}: ${fmtDate(l.followup_date)}${(l.followup_kind==='appointment'&&l.followup_time)?' at '+l.followup_time:''} &middot; set by ${l.followup_set_by||meName()}</span>` : `<span class="muted">none set</span>`;
  document.getElementById("modalRoot").innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
   <div class="modal" style="max-width:560px">
     <h3>${escapeHtml(l.name)}</h3>
     <div class="ms">${escapeHtml(l.phone||'—')}${l.email?' · ✉ '+escapeHtml(l.email):''} · ${escapeHtml(l.state||'')} · age ${l.age||'—'}${l.gender?' · '+escapeHtml(l.gender):''}${l.dob?' · DOB '+escapeHtml(fmtDob(l.dob)):''} · <span class="tag t-${l.status}">${l.status}</span>${cbBadge(l)}${l.dnc?' <span class="tag" style="background:var(--red)">⛔ DNC</span>':''}${l.last_disposition?' <span class="pill">'+escapeHtml(l.last_disposition)+'</span>':''}</div>
     ${(()=>{const a=[l.address,l.city,[l.state,l.zip].filter(Boolean).join(' ')].filter(Boolean).join(', ');return a?`<div class="ms" style="margin:-8px 0 8px">📍 ${escapeHtml(a)}</div>`:'';})()}
     <div class="muted" style="font-size:11px;margin:-4px 0 10px">⬆ Imported by <b>${escapeHtml(l.imported_by||'—')}</b>${l.imported_at?' · '+fmtDate(l.imported_at):''}</div>
     <div style="margin:-6px 0 12px">
       ${l.chargebackClient?'<span class="muted" style="font-size:11px">Flagged as a former client who charged back.</span>':'<span class="muted" style="font-size:11px">Not flagged as a charged-back client.</span>'}
       ${canEdit?`<button class="btn s sm" style="margin-left:8px" onclick="toggleChargebackClient('${l.id}')">${l.chargebackClient?'Remove charge-back flag':'⚡ Mark charged-back client'}</button>`:''}
     </div>
     ${canEdit?`
     <div style="background:#f4f6f5;border:1px solid var(--rule);border-radius:10px;padding:10px 12px;margin-bottom:14px">
       <div style="font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:6px">EDIT CONTACT · ${isOwner()?'admin':'you imported this lead'}</div>
       <div class="grid2">
         <div class="field" style="margin:0"><label>Name</label><input id="ed_name" value="${escapeHtml(l.name||'')}"></div>
         <div class="field" style="margin:0"><label>Phone</label><input id="ed_phone" value="${escapeHtml(l.phone||'')}"></div>
         <div class="field" style="margin:0"><label>Email</label><input id="ed_email" value="${escapeHtml(l.email||'')}"></div>
         <div class="field" style="margin:0;align-self:end"><button class="btn p sm" onclick="saveLeadContact('${l.id}')">Save contact</button></div>
       </div>
     </div>`:""}

     <div class="field" style="margin-bottom:6px"><label>Scheduled &nbsp; ${fuLabel}</label></div>
     <div style="font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:4px">FOLLOW-UP (CALLBACK)</div>
     <div class="row" style="margin-bottom:10px">
       <button class="btn s sm" onclick="setFollowup('${l.id}',1)">Tomorrow</button>
       <button class="btn s sm" onclick="setFollowup('${l.id}',3)">In 3 days</button>
       <button class="btn s sm" onclick="setFollowup('${l.id}',7)">Next week</button>
       <input type="date" style="padding:7px;border:1px solid var(--rule);border-radius:8px;font-size:12px" onchange="setFollowupDate('${l.id}',this.value)">
     </div>
     <div style="font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:4px">APPOINTMENT (DATE + TIME)</div>
     <div class="row" style="margin-bottom:15px">
       <input type="date" id="apDate" style="padding:7px;border:1px solid var(--rule);border-radius:8px;font-size:12px">
       <input type="time" id="apTime" style="padding:7px;border:1px solid var(--rule);border-radius:8px;font-size:12px">
       <button class="btn p sm" onclick="setAppointment('${l.id}')">Set appointment</button>
       ${l.followup_date?`<button class="btn d sm" onclick="setFollowup('${l.id}',0,true)">Clear</button>`:""}
     </div>

     <div class="grid2">
       <div class="field"><label>Call outcome (disposition)</label>
         <select id="dispo">
           <option value="">— select outcome —</option>
           ${DISPOSITIONS.map(d=>`<option>${d}</option>`).join("")}
         </select></div>
       <div class="field"><label>Note / comment (optional)</label>
         <textarea id="noteBox" rows="2" placeholder="e.g. left VM — or — wants spouse on next call"></textarea></div>
     </div>
     <div class="row" style="margin-bottom:6px">
       <button class="btn p sm" onclick="logCall('${l.id}')">Log Call</button>
       <button class="btn s sm" onclick="addNote('${l.id}')">Save Note</button>
     </div>
     <div class="muted" style="font-size:10.5px;margin-bottom:15px">"Callback" auto‑schedules a follow‑up for tomorrow · "DNC" removes the lead from the pool.</div>

     <div class="field"><label>Call log &amp; notes</label></div>
     <div id="noteList" style="max-height:230px;overflow:auto">${renderNotes(l)}</div>

     <div class="mfoot" style="margin-top:16px">
       ${(l.status==="working"||l.status==="available"||l.status==="reopened")?`<button class="btn p sm" onclick="closeModal();openClose('${l.id}')">Mark Sold</button>`:""}
       <button class="btn s" onclick="closeModal()">Done</button>
     </div>
   </div>
  </div>`;
}
function renderNotes(l){
  if(!l.notes||!l.notes.length) return `<div class="muted" style="padding:6px 0">No notes yet — log your first call above.</div>`;
  const owner=isOwner(); // only admins/owners can delete notes
  // keep each note's original index so deletion targets the right one
  return l.notes.map((n,idx)=>({n,idx})).reverse().map(({n,idx})=>`<div style="padding:8px 0;border-bottom:1px solid var(--rule);display:flex;gap:8px;align-items:flex-start">
     <div style="flex:1;min-width:0">
       <div style="font-size:11px;color:var(--muted)"><b style="color:var(--ink)">${escapeHtml(n.agent)}</b> · ${fmtWhen(n.ts)}</div>
       <div style="font-size:13px;margin-top:2px">${escapeHtml(n.text)}</div>
     </div>
     ${owner?`<button class="btn d sm" title="Delete note (admin only)" onclick="deleteNote('${l.id}',${idx})">✕</button>`:""}
   </div>`).join("");
}
function refreshNotes(id){ const l=S.leads.find(x=>x.id===id); const el=document.getElementById("noteList"); if(el&&l) el.innerHTML=renderNotes(l); }
async function addNote(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  const box=document.getElementById("noteBox"); const txt=(box.value||"").trim();
  if(!txt){ box.focus(); return; }
  if(!l.notes) l.notes=[];
  l.notes.push({ts:new Date().toISOString(), agent:meName(), text:txt});
  box.value=""; await saveLead(l); refreshNotes(id);
}
// Edit a lead's name / phone / email. Allowed only for an admin/owner or the
// agent who imported the lead.
async function saveLeadContact(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(!(isOwner() || (l.imported_by && l.imported_by===meName()))){ alert("Only an admin or the agent who imported this lead can edit it."); return; }
  const name=(document.getElementById("ed_name").value||"").trim();
  const phone=(document.getElementById("ed_phone").value||"").trim();
  const email=(document.getElementById("ed_email").value||"").trim();
  if(!name){ alert("Name can't be empty."); return; }
  l.name=name; l.phone=phone; l.email=email;
  await saveLead(l); openLead(id); render();
}
// Toggle the charged-back-client flag. Importer or admin only.
async function toggleChargebackClient(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(!(isOwner() || (l.imported_by && l.imported_by===meName()))){ alert("Only an admin or the agent who imported this lead can change this flag."); return; }
  l.chargebackClient=!l.chargebackClient;
  await saveLead(l); openLead(id); render();
}
// Admin-only: delete a single note by its original index.
async function deleteNote(id, idx){
  if(!isOwner()){ alert("Only an admin can delete notes."); return; }
  const l=S.leads.find(x=>x.id===id); if(!l||!l.notes) return;
  if(idx<0 || idx>=l.notes.length) return;
  if(!confirm("Delete this note? This can't be undone.")) return;
  l.notes.splice(idx,1);
  await saveLead(l); refreshNotes(id);
}
async function logCall(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(!agentById(S.me)){ alert("Your profile isn't loaded — click ↻ Refresh, then try again."); return; }
  l.times_worked=(l.times_worked||0)+1; l.last_called_by=meName(); l.last_called_date=today();
  if(!l.touched_by) l.touched_by=[]; if(!l.touched_by.includes(meName())) l.touched_by.push(meName());
  const box=document.getElementById("noteBox"); const txt=(box.value||"").trim();
  const dispoSel=document.getElementById("dispo"); const dispo=dispoSel?dispoSel.value:"";
  if(dispo){
    l.last_disposition=dispo;
    if(dispo==="DNC") l.dnc=true;                                  // suppress from pool/pipeline
    if(dispo==="Callback" && !l.followup_date){                    // queue a callback so it lands in Follow-ups/Calendar
      l.followup_date=addDays(1); l.followup_time=""; l.followup_kind="followup"; l.followup_set_by=meName();
    }
  }
  if(!l.notes) l.notes=[];
  const text = (dispo? "["+dispo+"]" : "") + (txt? (dispo?" ":"")+txt : (dispo?"":"Called — no answer / no note"));
  l.notes.push({ts:new Date().toISOString(), agent:meName(), text:text, disposition:dispo||"", call:true});
  box.value=""; if(dispoSel) dispoSel.value="";
  await saveLead(l); refreshNotes(id); render();
}
async function setFollowup(id,days,clear){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  if(clear){ l.followup_date=null; l.followup_time=""; l.followup_kind=null; l.followup_set_by=null; }
  else { l.followup_date=addDays(days); l.followup_time=""; l.followup_kind="followup"; l.followup_set_by=meName(); }
  await saveLead(l); openLead(id);
}
async function setFollowupDate(id,val){
  const l=S.leads.find(x=>x.id===id); if(!l||!val) return;
  l.followup_date=val; l.followup_time=""; l.followup_kind="followup"; l.followup_set_by=meName(); await saveLead(l); openLead(id);
}
async function setAppointment(id){
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  const d=document.getElementById("apDate").value, t=document.getElementById("apTime").value;
  if(!d){ alert("Pick an appointment date."); return; }
  l.followup_date=d; l.followup_time=t?fmtTime(t):""; l.followup_kind="appointment"; l.followup_set_by=meName();
  await saveLead(l); openLead(id);
}

/* ---------- nav ---------- */
function go(v){ if((v==="admin"||v==="command")&&!isOwner()) v="dash"; S.view=v; render(); window.scrollTo(0,0); }
function setBoard(m){ S.boardMode=m; render(); }
function fillMe(){ const el=document.getElementById("meName"); if(el) el.textContent=meName(); }
// Show/hide a password field.
function togglePw(id, btn){ const el=document.getElementById(id); if(!el) return; const show=el.type==="password"; el.type=show?"text":"password"; if(btn) btn.textContent=show?"Hide":"Show"; }
const PWEYE = id => `<span onclick="togglePw('${id}',this)" style="float:right;cursor:pointer;color:var(--accent);font-weight:700;text-transform:none;letter-spacing:0;font-size:11px">Show</span>`;

/* ---------- init ---------- */
async function init(){
  // Wiring is wrapped so a single failure can never leave a blank screen.
  try{
    document.getElementById("nav").addEventListener("click",e=>{const b=e.target.closest("button");if(b){go(b.dataset.v);}});
    document.getElementById("refreshBtn").addEventListener("click",async()=>{ try{ await loadAll(); render(); }catch(e){ alert("Couldn't refresh — check your connection."); } });
    document.getElementById("logoutBtn").addEventListener("click",doLogout);
    document.getElementById("pwBtn").addEventListener("click",openPw);
    document.getElementById("loginBtn").addEventListener("click",doLogin);
    document.getElementById("signupBtn").addEventListener("click",openSignup);
    document.getElementById("lpass").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
    document.getElementById("luser").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("lpass").focus(); });
    document.getElementById("loginhint").innerHTML='New here? Click <b>Request an agent account</b> — an admin approves you, then you can log in.';
  }catch(e){ console.error("init wiring failed", e); }
  // restore an existing Supabase session if present — but never block the login screen
  try{
    const { data:{ session } } = await SB.auth.getSession();
    if(session){ await afterLogin(session); }
    else { showLogin(); }
  }catch(e){
    console.error("startup failed", e);
    try{ showLogin(); const el=document.getElementById("lerr"); if(el){ el.style.color="var(--red)"; el.textContent="Couldn't reach the server — refresh to try again."; } }catch(_){}
  }
}
// If the Supabase library failed to load, show a clear message instead of a blank page.
if(!window.supabase){
  try{ document.getElementById("login").style.display="flex"; var le=document.getElementById("lerr"); if(le){ le.style.color="var(--red)"; le.textContent="Couldn't load a required library. Check your connection / ad-blocker and refresh."; } }catch(_){}
} else {
  init();
}
</script>
